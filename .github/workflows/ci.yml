name: CI / CD Pipeline (Spring Boot & Vue.js)

on:
  push:
    branches: [ main, master, dev, staging ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Memungkinkan memicu workflow secara manual dari UI GitHub

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # Menyesuaikan dengan packageManager: "pnpm@10.33.2" di package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build Frontend (Vite / Vue)
        working-directory: ./frontend
        run: pnpm run build

      - name: Upload Frontend Static Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/main/resources/static/
          retention-days: 7

  backend-build-and-test:
    name: Backend Build & Test (Spring Boot)
    needs: frontend-build
    runs-on: ubuntu-latest
    
    services:
      postgres: 
        image: postgres:16-alpine
        env:
          POSTGRES_DB: db_screet
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d db_screet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/db_screet
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Frontend Static Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/main/resources/static

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      - name: Build & Test Backend (Skip Frontend Rebuild)
        run: ./mvnw clean verify -Pskip-frontend

      - name: Upload Spring Boot Executable JAR
        uses: actions/upload-artifact@v4
        with:
          name: spravel-app-jar
          path: target/*.jar
          retention-days: 7
